name: kim_var
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.0
  google_fonts: ^6.3.0
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.5
  cloud_functions: ^5.1.5
  permission_handler: ^11.3.1
  intl: ^0.20.2
  video_player: ^2.9.2
  video_thumbnail: ^0.5.3
  record: ^6.1.1
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  package_info_plus: ^8.1.1
  device_info_plus: ^11.2.0
  firebase_messaging: ^15.1.5
  firebase_app_check: ^0.3.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  flutter_slidable: ^3.1.1
  geocoding: ^3.0.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  image_cropper: ^8.0.0
  geoflutterfire_plus: ^0.0.31
  http: ^1.2.2
  gal: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.1

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon.png
    - assets/icon_foreground.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#003C33"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true